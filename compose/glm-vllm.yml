# ──────────────────────────────────────────────────────────────────────────────
# GLM-5.2 NVFP4 — vLLM (env-var-driven)
#
# Usage (via local-ai.sh menu):
#   ./local-ai.sh config  →  select "glm-5.2-vllm"
#   ./local-ai.sh up
#
# Env var reference:
#   CONTAINER_NAME     container name                   (default: vllm-glm-5.2)
#   MODEL_DIR          weights root                     (default: ../models)
#   MODEL_SUBDIR       model subdirectory               (required)
#   MODEL_ALIAS        served model name                (default: local)
#   KV_CACHE_DTYPE     kv-cache-dtype                   (default: fp8_e4m3)
#   GPU_MEMORY_UTIL    VRAM fraction                    (default: 0.94)
#   MAX_MODEL_LEN      max context length               (default: 1048576, 1M)
#   MAX_NUM_SEQS       max concurrent sequences         (default: 8)
#   PORT               host port                        (default: 8020)
#   GPU_DEVICE         GPU indices for TP=8             (default: 0,1,2,3,4,5,6,7)
#   CHAT_TEMPLATE_PATH path to chat template jinja       (volume-mounted, not passed as CLI arg)
#   VLLM_IMAGE         Docker image                     (default: vllm/vllm-openai:v0.24.0)
# ──────────────────────────────────────────────────────────────────────────────

services:
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.24.0}
    container_name: "${CONTAINER_NAME:-vllm-glm-5.2}"
    restart: unless-stopped
    ports:
      - "${PORT:-8020}:8000"
    volumes:
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
      - ../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../cache/triton:/root/.triton/cache
      - ../cache/flashinfer:/root/.cache/flashinfer
      - ${CHAT_TEMPLATE_PATH:-../chat-templates/glm-5.2/chat_template.jinja}:/etc/glm-chat-template.jinja:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${GPU_DEVICE:-0,1,2,3,4,5,6,7}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - VLLM_TEST_ENABLE_AOT_COMPILE=1
      - TRITON_CACHE_DIR=/root/.triton/cache
      - TRITON_COMPILE_BYTECODE=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE:-0,1,2,3,4,5,6,7}"]
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        exec vllm serve "$$@"
      - "--"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/${MODEL_SUBDIR}
      - --served-model-name
      - ${MODEL_ALIAS:-local}
      - --tensor-parallel-size
      - "${TENSOR_PARALLEL_SIZE:-8}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTIL:-0.94}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-1048576}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-8}"
      - --kv-cache-dtype
      - ${KV_CACHE_DTYPE:-fp8_e4m3}
      - --trust-remote-code
      - --enable-expert-parallel
      - --speculative-config.method
      - mtp
      - --speculative-config.num_speculative_tokens
      - "5"
      - --reasoning-parser
      - glm45
      - --tool-call-parser
      - glm47
      - --enable-auto-tool-choice
      - --disable-custom-all-reduce
