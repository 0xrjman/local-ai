# ──────────────────────────────────────────────────────────────────────────────
# vLLM NVFP4 + TurboQuant 4-bit KV — Qwen3.6-27B on RTX 5090
# ──────────────────────────────────────────────────────────────────────────────
#
# Engine:    vLLM v0.23.0
# Model:     Qwen3.6-27B NVFP4 (sakamakismile — Blackwell FP4 native)
# MTP:       no (no speculative decoding)
# KV cache:  turboquant_4bit_nc
# Vision:    no (text-only)
# Context:   120K tokens
# Concurrency: 6 sequences
# Perf mode: interactivity
# Genesis:   P98 TQ WorkspaceManager revert (GENESIS_ENABLE_P98=1)
#
# Weights:
#   https://huggingface.co/sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
#   ~19 GB, expects: $MODEL_DIR/qwen3.6-27b-nvfp4-mtp/model.safetensors
#
# Env overrides:
#   MODEL_DIR         weights root            (default: ../models)
#   MODEL_ALIAS       served model name       (default: local)
#   MAX_MODEL_LEN     context length          (default: 120000)
#   GPU_MEMORY_UTIL   VRAM fraction           (default: 0.94)
#   MAX_NUM_SEQS      max concurrent          (default: 6)
#   PORT              host port               (default: 8020)
#   VLLM_IMAGE        Docker image            (default: vllm/vllm-openai:v0.23.0)
#   GENESIS_DIR       Genesis patches dir     (default: ../genesis/vllm/_genesis)
#
# ──────────────────────────────────────────────────────────────────────────────

services:
  vllm-qwen36-nvfp4-tq:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.23.0}
    container_name: "vllm-qwen36-nvfp4-tq"
    restart: unless-stopped
    ports:
      - "${PORT:-8020}:8000"
    volumes:
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
      - ../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../cache/triton:/root/.triton/cache
      - ../cache/flashinfer:/root/.cache/flashinfer
      - ${GENESIS_DIR:-../genesis/vllm/_genesis}:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${GPU_DEVICE:-0}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_BUILD_COMMIT=
      - VLLM_BUILD_PIPELINE=
      - VLLM_BUILD_URL=
      - VLLM_IMAGE_TAG=
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - TRITON_CACHE_DIR=/root/.triton/cache
      - CUDA_DEVICE_MAX_CONNECTIONS=8
      - GENESIS_ENABLE_P98=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE:-0}"]
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        python3 -m vllm._genesis.patches.apply_all
        exec vllm serve "$@"
      - "--"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-nvfp4-mtp
      - --served-model-name
      - ${MODEL_ALIAS:-local}
      - --quantization
      - compressed-tensors
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "${MAX_MODEL_LEN:-120000}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTIL:-0.94}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-6}"
      - --max-num-batched-tokens
      - "32768"
      - --kv-cache-dtype
      - turboquant_4bit_nc
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --language-model-only
      - --skip-mm-profiling
      - --performance-mode
      - interactivity
