# ──────────────────────────────────────────────────────────────────────────────
# [WIP] GLM-5.2 NVFP4 — SGLang (dev-glm52-nvfp4, env-var-driven)
#
# Known bug: cuBLAS bf16 GEMM crash on B200 during flashinfer autotune /
# CUDA graph capture. May require --disable-flashinfer-autotune
# and --cuda-graph-backend-prefill=disabled as workaround.
#
# Usage (via local-ai.sh menu):
#   ./local-ai.sh config  →  select "glm-5.2-sglang"
#   ./local-ai.sh up
#
# Env var reference:
#   CONTAINER_NAME     container name                   (default: sglang-glm-5.2)
#   MODEL_DIR          weights root                     (default: ../models)
#   MODEL_SUBDIR       model subdirectory               (required)
#   MODEL_ALIAS        served model name                (default: local)
#   QUANT_MODE         quantization backend             (default: modelopt)
#   KV_CACHE_DTYPE     kv-cache-dtype                   (default: fp8_e4m3)
#   MAX_MODEL_LEN      context length                   (default: 1048576)
#   MEM_FRACTION_STATIC  SGLang mem-fraction-static     (default: 0.80)
#   MAX_NUM_SEQS       max concurrent                   (default: 8)
#   PORT               host port                        (default: 8020)
#   GPU_DEVICE         GPU indices for TP=8             (default: 0,1,2,3,4,5,6,7)
#   SGLANG_IMAGE       Docker image                     (default: lmsysorg/sglang:dev-glm52-nvfp4)
# ──────────────────────────────────────────────────────────────────────────────

services:
  sglang:
    image: ${SGLANG_IMAGE:-lmsysorg/sglang:dev-glm52-nvfp4}
    container_name: "${CONTAINER_NAME:-sglang-glm-5.2}"
    restart: unless-stopped
    ports:
      - "${PORT:-8020}:8000"
    volumes:
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
      - ../cache/triton:/root/.triton/cache
      - ../cache/flashinfer:/root/.cache/flashinfer
    environment:
      - NVIDIA_VISIBLE_DEVICES=${GPU_DEVICE:-0,1,2,3,4,5,6,7}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "32gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE:-0,1,2,3,4,5,6,7}"]
              capabilities: [gpu]
    entrypoint: ["python3", "-m", "sglang.launch_server"]
    command:
      - "--model-path"
      - "/root/.cache/huggingface/${MODEL_SUBDIR}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--tensor-parallel-size"
      - "${TENSOR_PARALLEL_SIZE:-8}"
      - "--quantization"
      - "${QUANT_MODE:-modelopt_fp4}"
      - "--kv-cache-dtype"
      - "${KV_CACHE_DTYPE:-fp8_e4m3}"
      - "--context-length"
      - "${MAX_MODEL_LEN:-1048576}"
      - "--mem-fraction-static"
      - "${MEM_FRACTION_STATIC:-0.80}"
      - "--max-running-requests"
      - "${MAX_NUM_SEQS:-8}"
      - "--served-model-name"
      - "${MODEL_ALIAS:-local}"
      - "--trust-remote-code"
      - "--chunked-prefill-size"
      - "16384"
      - "--tool-call-parser"
      - "glm47"
      - "--reasoning-parser"
      - "glm45"
