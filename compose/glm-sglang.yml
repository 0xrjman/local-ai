# ──────────────────────────────────────────────────────────────────────────────
# GLM-5.2 NVFP4 — SGLang v0.5.14 (env-var-driven)
#
# Usage (via 5090-ai.sh menu):
#   ./5090-ai.sh config  →  select "glm-5.2-sglang"
#   ./5090-ai.sh up
#
# Env var reference:
#   CONTAINER_NAME     container name                   (default: sglang-glm-5.2)
#   MODEL_DIR          weights root                     (default: ../models)
#   MODEL_SUBDIR       model subdirectory               (required)
#   MODEL_ALIAS        served model name                (default: local)
#   QUANT_MODE         quantization backend             (default: modelopt)
#   KV_CACHE_DTYPE     kv-cache-dtype                   (default: fp8_e4m3)
#   MAX_MODEL_LEN      context length                   (default: 1048576)
#   GPU_MEMORY_UTIL    VRAM fraction                    (default: 0.94)
#   MAX_NUM_SEQS       max concurrent                   (default: 8)
#   PORT               host port                        (default: 8031)
#   GPU_DEVICE         GPU indices for TP=4             (default: 0,1,2,3)
#   SGLANG_IMAGE       Docker image                     (default: lmsysorg/sglang:v0.5.14)
# ──────────────────────────────────────────────────────────────────────────────

services:
  sglang:
    image: ${SGLANG_IMAGE:-lmsysorg/sglang:v0.5.14}
    container_name: "${CONTAINER_NAME:-sglang-glm-5.2}"
    restart: unless-stopped
    ports:
      - "${PORT:-8031}:8000"
    volumes:
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
      - ../cache/triton:/root/.triton/cache
      - ../cache/flashinfer:/root/.cache/flashinfer
    environment:
      - NVIDIA_VISIBLE_DEVICES=${GPU_DEVICE:-0,1,2,3}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "32gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE:-0,1,2,3}"]
              capabilities: [gpu]
    entrypoint: ["python3", "-m", "sglang.launch_server"]
    command:
      - "--model-path"
      - "/root/.cache/huggingface/${MODEL_SUBDIR}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--tensor-parallel-size"
      - "4"
      - "--quantization"
      - "${QUANT_MODE:-modelopt}"
      - "--kv-cache-dtype"
      - "${KV_CACHE_DTYPE:-fp8_e4m3}"
      - "--context-length"
      - "${MAX_MODEL_LEN:-1048576}"
      - "--mem-fraction-static"
      - "${GPU_MEMORY_UTIL:-0.94}"
      - "--max-running-requests"
      - "${MAX_NUM_SEQS:-8}"
      - "--trust-remote-code"
      - "--enable-prefix-caching"
      - "--enable-chunked-prefill"
