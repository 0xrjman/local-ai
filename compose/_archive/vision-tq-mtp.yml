# ──────────────────────────────────────────────────────────────────────────────
# vLLM ModelOpt+MTP — AEON Qwen3.6-27B Ultimate XS + TurboQuant 4-bit KV
# ──────────────────────────────────────────────────────────────────────────────
#
# Engine:    vLLM v0.24.0
# Model:     AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-Multimodal-NVFP4-MTP-XS
#            (modelopt NVFP4, GDN projections FP4, conv1d BF16 preserved)
# Drafter:   MTP n=3 (grafted qwen3.5_mtp head, bf16)
# KV cache:  turboquant_4bit_nc (TurboQuant 4-bit, non-contiguous)
# Vision:    yes (Qwen3.5 mm arch)
# Context:   324K tokens (default)
# Concurrency: 8 sequences
# Perf mode: interactivity
#
# Weights:
#   https://huggingface.co/AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-Multimodal-NVFP4-MTP-XS
#   ~21 GB (XS — GDN proj NVFP4), expects: $MODEL_DIR/aeon-qwen3.6-27b-ultimate-nvfp4-mtp-xs/
#
# Genesis patches: P5B (pad-smaller-to-max), P67_TQ (turboquant multi-query),
#   PN8 (MTP draft online quant), PN59/PN54/PN32 (GDN OOM fixes), PN34 (workspace),
#   P82, P98
#
# Env overrides:
#   MODEL_DIR         weights root            (default: ../models)
#   GENESIS_DIR       Genesis patches root    (default: ../genesis/vllm/_genesis)
#   MODEL_ALIAS       served model name       (default: local)
#   MAX_MODEL_LEN     context length          (default: 332000)
#   GPU_MEMORY_UTIL   VRAM fraction           (default: 0.92)
#   SPEC_N_MAX        MTP draft tokens        (default: 3)
#   MAX_NUM_SEQS      max concurrent          (default: 8)
#   MAX_NUM_BATCHED   max batched tokens      (default: 4096)
#   PORT              host port               (default: 8020)
#   VLLM_IMAGE        Docker image            (default: vllm/vllm-openai:v0.24.0)
#
# ──────────────────────────────────────────────────────────────────────────────

services:
  vllm-vision-tq-mtp:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.24.0}
    container_name: "vllm-vision-tq-mtp"
    restart: unless-stopped
    ports:
      - "${PORT:-8020}:8000"
    volumes:
      - ${GENESIS_DIR:-../genesis/vllm/_genesis}:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
      - ../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../cache/triton:/root/.triton/cache
      - ../cache/flashinfer:/root/.cache/flashinfer
      - ../manifests/prealloc:/root/.cache/genesis/prealloc_v2
      - ../chat-templates/froggeric/chat_template.jinja:/etc/qwen-chat-template.jinja:ro
    environment:
      # Prealloc v2 recorder (first run) → switch to REPLAY after
      - GENESIS_ENABLE_PREALLOC_V2_RECORDER=1
      - GENESIS_PREALLOC_V2_CACHE_DIR=/root/.cache/genesis/prealloc_v2
      - GENESIS_ENABLE_P5B=1
      - GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL=1
      - GENESIS_ENABLE_PN34_WORKSPACE_LOCK_RELAX=1
      # Disabled for debug: PN8, P82, P98, PN59, PN54, PN32
      - NVIDIA_VISIBLE_DEVICES=${GPU_DEVICE:-0}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_BUILD_COMMIT=
      - VLLM_BUILD_PIPELINE=
      - VLLM_BUILD_URL=
      - VLLM_IMAGE_TAG=
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - VLLM_TEST_ENABLE_AOT_COMPILE=1
      - TRITON_CACHE_DIR=/root/.triton/cache
      - TRITON_COMPILE_BYTECODE=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE:-0}"]
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        python3 -m vllm._genesis.patches.apply_all
        exec vllm serve "$@"
      - "--"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/aeon-qwen3.6-27b-ultimate-nvfp4-mtp-xs
      - --served-model-name
      - ${MODEL_ALIAS:-local}
      - --quantization
      - modelopt
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "${MAX_MODEL_LEN:-332000}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTIL:-0.92}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-6}"
      - --max-num-batched-tokens
      - "${MAX_NUM_BATCHED:-4096}"
      - --kv-cache-dtype
      - turboquant_4bit_nc
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --chat-template
      - /etc/qwen-chat-template.jinja
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"qwen3_5_mtp","num_speculative_tokens":${SPEC_N_MAX:-3}}'
      - --performance-mode
      - interactivity
