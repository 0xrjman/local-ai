# ──────────────────────────────────────────────────────────────────────────────
# vLLM+HuiHui — Qwen3.6-27B (Huihui abliterated) + TurboQuant 4-bit KV
# ──────────────────────────────────────────────────────────────────────────────
#
# Engine:    vLLM v0.24.0
# Model:     Qwen3.6-27B NVFP4 (sakamakismile — Huihui abliterated + MTP)
# Drafter:   MTP n=3 (embedded MTP head, bf16)
# KV cache:  turboquant_4bit_nc (TurboQuant 4-bit, non-contiguous)
# Vision:    yes (mmproj, Qwen3.5 arch)
# Context:   312K tokens (~214K safe ceiling)
# Concurrency: 4 sequences
# Perf mode: interactivity
#
# Weights:
#   https://huggingface.co/sakamakismile/Huihui-Qwen3.6-27B-abliterated-NVFP4-MTP
#   ~19 GB, expects: $MODEL_DIR/huihui-qwen3.6-27b-abliterated-nvfp4-mtp/model.safetensors
#
# Env overrides:
#   MODEL_DIR         weights root            (default: ../models)
#   MODEL_ALIAS       served model name       (default: local)
#   MAX_MODEL_LEN     context length          (default: 320000)
#   GPU_MEMORY_UTIL   VRAM fraction           (default: 0.92)
#   SPEC_N_MAX        MTP draft tokens        (default: 3)
#   MAX_NUM_SEQS      max concurrent          (default: 4)
#   PORT              host port               (default: 8020)
#   VLLM_IMAGE        Docker image            (default: vllm/vllm-openai:v0.24.0)
#
# Genesis GDN patches: PN59 (streaming GDN orchestrator), PN54 (contiguous dedup),
#   PN32 (chunked prefill v2) — Cliff 2/2b OOM mitigation
#
# ──────────────────────────────────────────────────────────────────────────────

services:
  vllm-huihui-vision-tq-mtp:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.24.0}
    container_name: "vllm-huihui-vision-tq-mtp"
    restart: unless-stopped
    ports:
      - "${PORT:-8020}:8000"
    volumes:
      - ${GENESIS_DIR:-../genesis/vllm/_genesis}:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
      - ../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../cache/triton:/root/.triton/cache
      - ../cache/flashinfer:/root/.cache/flashinfer
      - ../manifests/prealloc:/root/.cache/genesis/prealloc_v2
      - ../chat-templates/huihui/chat_template.jinja:/etc/qwen-froggeric-chat-template.jinja:ro
    environment:
      # Prealloc v2 recorder (first run) → switch to REPLAY after
      - GENESIS_ENABLE_PREALLOC_V2_RECORDER=1
      - GENESIS_PREALLOC_V2_CACHE_DIR=/root/.cache/genesis/prealloc_v2
      - GENESIS_ENABLE_P98=1
      - GENESIS_ENABLE_P5B=1
      - GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL=1
      - GENESIS_ENABLE_PN8_MTP_DRAFT_ONLINE_QUANT=1
      - GENESIS_ENABLE_PN34_WORKSPACE_LOCK_RELAX=1
      - GENESIS_ENABLE_P82=1
      # GDN OOM fixes — Cliff 2/2b long-context prefill
      - GENESIS_ENABLE_PN59_STREAMING_GDN=1
      - GENESIS_ENABLE_PN54_GDN_CONTIGUOUS_DEDUP=1
      - GENESIS_ENABLE_PN32_GDN_CHUNKED_PREFILL=1
      - NVIDIA_VISIBLE_DEVICES=${GPU_DEVICE:-0}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_BUILD_COMMIT=
      - VLLM_BUILD_PIPELINE=
      - VLLM_BUILD_URL=
      - VLLM_IMAGE_TAG=
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - VLLM_TEST_ENABLE_AOT_COMPILE=1
      - TRITON_CACHE_DIR=/root/.triton/cache
      - TRITON_COMPILE_BYTECODE=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE:-0}"]
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        python3 -m vllm._genesis.patches.apply_all
        exec vllm serve "$@"
      - "--"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/huihui-qwen3.6-27b-abliterated-nvfp4-mtp
      - --served-model-name
      - ${MODEL_ALIAS:-local}
      - --quantization
      - compressed-tensors
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "${MAX_MODEL_LEN:-320000}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTIL:-0.89}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-4}"
      - --max-num-batched-tokens
      - "${MAX_NUM_BATCHED:-3120}"
      - --kv-cache-dtype
      - turboquant_4bit_nc
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --chat-template
      - /etc/qwen-froggeric-chat-template.jinja
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --performance-mode
      - interactivity

      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":${SPEC_N_MAX:-3}}'

      # - --compilation-config
      # - '{"mode":"VLLM_COMPILE","max_cudagraph_capture_size": 4,"compile_sizes":[1,2,3,4]}'
